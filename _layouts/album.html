<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.album_name }} · {{ site.title }}</title>
  {% include favicon.html %}
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body class="site-page site-album">
  <main class="container">
    <a class="back-link" href="{{ '/' | relative_url }}">← Back to albums</a>

    <header class="hero hero--album">
      <p class="eyebrow">Album</p>
      <h1>{{ page.album_name }}</h1>
      <p class="subtitle">Browse by category within this album.</p>
    </header>

    <section>
      <h2 class="section-title">Categories</h2>
      <div id="category-nav" class="category-nav"></div>
    </section>

    <div id="album-gallery" class="album-gallery"></div>
  </main>

  {% assign album_prefix = 'images/' | append: page.album_dir | append: '/' %}
  <script>
    window.albumName = {{ page.album_name | jsonify }};
    window.albumFiles = [
      {% for file in site.static_files %}
        {% assign p = file.path %}
        {% assign p_down = p | downcase %}
        {% assign album_prefix_down = album_prefix | downcase %}
        {% if p_down contains album_prefix_down and (p_down contains '.jpg' or p_down contains '.jpeg' or p_down contains '.png' or p_down contains '.gif' or p_down contains '.webp') %}
          {{ file.path | relative_url | jsonify }},
        {% endif %}
      {% endfor %}
    ];
  </script>

  <aside id="photo-modal" class="photo-modal" hidden>
    <div class="photo-modal__backdrop" data-close-modal></div>
    <div class="photo-modal__content">
      <button id="photo-modal-close" class="photo-modal__close" type="button" aria-label="Close photo viewer">×</button>
      <div class="photo-modal__image-wrap">
        <img id="photo-modal-image" class="photo-modal__image" alt="Selected photo">
      </div>
      <section class="photo-modal__meta">
        <h3 id="photo-modal-title" class="photo-modal__title"></h3>
        <button id="photo-modal-toggle" class="photo-modal__toggle" type="button">Fit to screen</button>
        <dl class="photo-properties">
          <dt>Album</dt><dd id="meta-album"></dd>
          <dt>Category</dt><dd id="meta-category"></dd>
          <dt>Filename</dt><dd id="meta-filename"></dd>
          <dt>Format</dt><dd id="meta-format"></dd>
          <dt>Resolution</dt><dd id="meta-resolution">Loading...</dd>
        </dl>
      </section>
    </div>
  </aside>
  <script src="{{ '/js/site.js' | relative_url }}"></script>
</body>
</html>
